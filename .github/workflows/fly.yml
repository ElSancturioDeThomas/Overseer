name: Fly Deploy

# Deploys to Fly.io on every push to main. This uses `flyctl deploy`, which
# builds straight from the Dockerfile (Elixir 1.20) and skips Fly's launch
# scanner (bundled Elixir 1.16.3, incompatible with this project's ~> 1.18
# requirement).
on:
  push:
    branches:
      - main

# Cancel an in-flight deploy if a newer commit lands on main.
concurrency:
  group: fly-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
