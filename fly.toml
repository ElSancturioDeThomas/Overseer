# fly.toml for the Overseer Phoenix app.
# Adjust `app` and `primary_region` to taste before deploying.
# NOTE: region `syd` (Sydney) is set here to match your launch. Your AWS
# Bedrock calls default to ap-southeast-1 (Singapore, `sin`); co-locating in
# `sin` would slightly lower LLM latency if you'd rather switch.

app = "overseer-app"
primary_region = "syd"

[build]

[env]
  PHX_HOST = "overseer-app.fly.dev"
  PORT = "4000"

# Runs database migrations on every deploy, before the new release goes live.
[deploy]
  release_command = "/app/bin/migrate"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
