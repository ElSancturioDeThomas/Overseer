# fly.toml for the Overseer Phoenix app.
# Adjust `app` and `primary_region` to taste before deploying.
# Region `sin` (Singapore) is chosen to sit close to AWS ap-southeast-1
# (Bedrock) used by the LLM module.

app = "overseer"
primary_region = "sin"

[build]

[env]
  PHX_HOST = "overseer.fly.dev"
  PORT = "4000"

# Runs database migrations on every deploy, before the new release goes live.
[deploy]
  release_command = "/app/bin/migrate"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
